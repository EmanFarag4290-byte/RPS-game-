<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rock: #FF6B6B;
    --paper: #4ECDC4;
    --scissors: #FFE66D;
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --win: #06d6a0;
    --lose: #ef476f;
    --draw: #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: white;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 30px;
  }

  .scoreboard {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }

  .score-box {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
    min-width: 90px;
  }

  .score-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 4px;
  }

  .score-num {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem;
    color: white;
    line-height: 1;
    transition: transform 0.2s;
  }

  .score-num.pop { animation: pop 0.3s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  .score-box.wins .score-num { color: var(--win); }
  .score-box.losses .score-num { color: var(--lose); }
  .score-box.draws .score-num { color: var(--draw); }

  .arena {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 500px;
  }

  .player-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .zone-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
  }

  .choice-display {
    width: 110px; height: 110px;
    background: var(--card);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    border: 2px solid rgba(255,255,255,0.07);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .choice-display.reveal {
    animation: reveal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes reveal {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
  }

  .vs {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .result-banner {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  .result-text {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem;
    letter-spacing: 3px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }

  .result-text.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-text.win { color: var(--win); }
  .result-text.lose { color: var(--lose); }
  .result-text.draw { color: var(--draw); }

  .choices {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }

  .choice-btn {
    width: 90px; height: 90px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.08);
    background: var(--card);
    font-size: 2.6rem;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }

  .choice-btn span.label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }

  .choice-btn:hover {
    transform: translateY(-6px) scale(1.05);
    border-color: rgba(255,255,255,0.25);
    background: #1e3050;
  }

  .choice-btn:active { transform: translateY(-2px) scale(0.97); }

  .choice-btn.rock:hover { border-color: var(--rock); box-shadow: 0 8px 30px rgba(255,107,107,0.3); }
  .choice-btn.paper:hover { border-color: var(--paper); box-shadow: 0 8px 30px rgba(78,205,196,0.3); }
  .choice-btn.scissors:hover { border-color: var(--scissors); box-shadow: 0 8px 30px rgba(255,230,109,0.3); }

  .choice-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .reset-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: rgba(255,255,255,0.4);
    color: white;
  }

  .thinking {
    display: none;
    font-size: 2rem;
    animation: spin 0.5s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .choice-display.loading .thinking { display: block; }
  .choice-display.loading .emoji { display: none; }

  .confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  .particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<h1>Rock <span>Paper</span> Scissors</h1>
<p class="subtitle">Best of forever</p>

<div class="scoreboard">
  <div class="score-box wins">
    <div class="score-label">You</div>
    <div class="score-num" id="winsEl">0</div>
  </div>
  <div class="score-box draws">
    <div class="score-label">Draws</div>
    <div class="score-num" id="drawsEl">0</div>
  </div>
  <div class="score-box losses">
    <div class="score-label">Me</div>
    <div class="score-num" id="lossesEl">0</div>
  </div>
</div>

<div class="arena">
  <div class="player-zone">
    <div class="zone-label">You</div>
    <div class="choice-display" id="playerDisplay">
      <span class="emoji">🤔</span>
    </div>
  </div>
  <div class="vs">VS</div>
  <div class="player-zone">
    <div class="zone-label">Me</div>
    <div class="choice-display" id="cpuDisplay">
      <span class="emoji">🤖</span>
      <span class="thinking">⚙️</span>
    </div>
  </div>
</div>

<div class="result-banner">
  <div class="result-text" id="resultText"></div>
</div>

<div class="choices">
  <button class="choice-btn rock" onclick="play('rock')" id="btn-rock">
    🪨<span class="label">Rock</span>
  </button>
  <button class="choice-btn paper" onclick="play('paper')" id="btn-paper">
    📄<span class="label">Paper</span>
  </button>
  <button class="choice-btn scissors" onclick="play('scissors')" id="btn-scissors">
    ✂️<span class="label">Scissors</span>
  </button>
</div>

<button class="reset-btn" onclick="resetGame()">↺ Reset Score</button>

<canvas class="confetti" id="confetti"></canvas>

<script>
  const emojis = { rock: '🪨', paper: '📄', scissors: '✂️' };
  const choices = ['rock', 'paper', 'scissors'];
  let wins = 0, losses = 0, draws = 0;
  let busy = false;

  function play(playerChoice) {
    if (busy) return;
    busy = true;

    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => b.disabled = true);

    const playerDisplay = document.getElementById('playerDisplay');
    const cpuDisplay = document.getElementById('cpuDisplay');
    const resultText = document.getElementById('resultText');

    // Show player choice
    playerDisplay.querySelector('.emoji').textContent = emojis[playerChoice];
    playerDisplay.classList.add('reveal');
    setTimeout(() => playerDisplay.classList.remove('reveal'), 400);

    // CPU thinking
    cpuDisplay.classList.add('loading');
    resultText.className = 'result-text';
    resultText.textContent = '';

    setTimeout(() => {
      const cpuChoice = choices[Math.floor(Math.random() * 3)];
      cpuDisplay.classList.remove('loading');
      cpuDisplay.querySelector('.emoji').textContent = emojis[cpuChoice];
      cpuDisplay.classList.add('reveal');
      setTimeout(() => cpuDisplay.classList.remove('reveal'), 400);

      // Determine result
      let result, cls, msg;
      if (playerChoice === cpuChoice) {
        result = 'draw'; cls = 'draw'; msg = "IT'S A DRAW!";
        draws++;
        animateScore('drawsEl');
      } else if (
        (playerChoice === 'rock' && cpuChoice === 'scissors') ||
        (playerChoice === 'paper' && cpuChoice === 'rock') ||
        (playerChoice === 'scissors' && cpuChoice === 'paper')
      ) {
        result = 'win'; cls = 'win'; msg = 'YOU WIN! 🎉';
        wins++;
        animateScore('winsEl');
        launchConfetti();
      } else {
        result = 'lose'; cls = 'lose'; msg = 'I WIN! 😈';
        losses++;
        animateScore('lossesEl');
      }

      document.getElementById('winsEl').textContent = wins;
      document.getElementById('drawsEl').textContent = draws;
      document.getElementById('lossesEl').textContent = losses;

      resultText.textContent = msg;
      resultText.className = `result-text show ${cls}`;

      setTimeout(() => {
        btns.forEach(b => b.disabled = false);
        busy = false;
      }, 800);

    }, 700);
  }

  function animateScore(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }

  function resetGame() {
    wins = 0; losses = 0; draws = 0;
    document.getElementById('winsEl').textContent = 0;
    document.getElementById('drawsEl').textContent = 0;
    document.getElementById('lossesEl').textContent = 0;
    document.getElementById('playerDisplay').querySelector('.emoji').textContent = '🤔';
    document.getElementById('cpuDisplay').querySelector('.emoji').textContent = '🤖';
    const resultText = document.getElementById('resultText');
    resultText.className = 'result-text';
    resultText.textContent = '';
  }

  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#06d6a0','#e94560','#a8dadc'];
    const particles = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: -10,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 4 + 2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      opacity: 1
    }));

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.y += p.speed;
        p.rot += p.rotSpeed;
        p.opacity -= 0.008;
        if (p.opacity > 0 && p.y < canvas.height) alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    cancelAnimationFrame(frame);
    draw();
  }
</script>
</body>
</html>
